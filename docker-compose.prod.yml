# 生产部署 docker-compose
# 用法：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hierarch-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_URL: postgresql+asyncpg://agent_user:agent_pass@postgres:5432/agent_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hierarch-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_WS_PROXY_TARGET: ws://backend:8000
