services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: agent_pass
      POSTGRES_DB: agent_db
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user -d agent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.0
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4j_password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 10s
      retries: 10

  falkordb:
    image: falkordb/falkordb-server:latest
    ports:
      - "16379:6379"
    volumes:
      - falkordbdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thinkweave-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_URL: postgresql+asyncpg://agent_user:agent_pass@postgres:5432/agent_db
      REDIS_URL: redis://redis:6379/0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agent_db
      DB_USERNAME: agent_user
      DB_PASSWORD: agent_pass
      VECTOR_DB_HOST: postgres
      VECTOR_DB_PORT: 5432
      VECTOR_DB_NAME: agent_db
      VECTOR_DB_USERNAME: agent_user
      VECTOR_DB_PASSWORD: agent_pass
      SYSTEM_ROOT_DIRECTORY: /app/.cognee_system
      DATA_ROOT_DIRECTORY: /app/.cognee_data
      CACHE_ROOT_DIRECTORY: /app/.cognee_cache
      FASTEMBED_CACHE_PATH: /app/.cognee_cache/fastembed_cache
      COGNEE_LOGS_DIR: /app/logs/cognee
      MEMORY_SESSION_ONLY_MODE: "true"
      DEBUG: "false"
      HTTP_PROXY: http://host.docker.internal:10808
      HTTPS_PROXY: http://host.docker.internal:10808
      ALL_PROXY: ""
      NO_PROXY: localhost,127.0.0.1,postgres,redis
      ENABLE_MCP_GATEWAY: "true"
      ENABLE_MCP_TOOL_EXECUTION: "true"
      MCP_SERVER_CONFIG_PATH: mcp_servers.json
      MCP_ENABLED_ROLES: researcher
      MCP_TOOL_TIMEOUT_SECONDS: 20
      MCP_FETCH_MAX_CHARS: 8000
      MCP_FILESYSTEM_ROOTS: /app/artifacts,/app/reports,/app/prompts
    ports:
      - "18080:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/prompts:/app/prompts
      - ./backend/mcp_servers.json:/app/mcp_servers.json
      - backend_cognee_system:/app/.cognee_system
      - backend_cognee_data:/app/.cognee_data
      - backend_cognee_cache:/app/.cognee_cache
      - backend_logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').getcode()==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thinkweave-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "15173:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
  neo4jdata:
  qdrantdata:
  falkordbdata:
  backend_cognee_system:
  backend_cognee_data:
  backend_cognee_cache:
  backend_logs:
